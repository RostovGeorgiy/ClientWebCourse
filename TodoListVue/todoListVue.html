<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
    <script defer src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script defer src="node_modules/vue/dist/vue.global.js"></script>
    <script defer src="todoListVue.js"></script>
    <title>Список задач</title>
</head>
<body>
<div id="app" class="container">
    <h1 class="header">Список задач</h1>

    <div class="form-list">
        <form id="new-todo-form" @submit.prevent="addTodoItem">
            <label for="new-todo-item-text-field">Введите текст задачи:</label>

            <div class="row gx-3">
                <div class="col">
                    <input v-model.trim="newTodoItemText" class="form-control new-todo-item-text-field"
                           id="new-todo-item-text-field" type="text" :class="{ 'is-invalid': isNewTodoItemTextInvalid }">
                    <div class="invalid-feedback">Необходимо заполнить поле</div>
                </div>
                <div class="col-auto">
                    <button class="btn btn-primary">Создать</button>
                </div>
            </div>
        </form>

        <ul class="todo-list mt-3" id="todo-list">
            <li v-for="item in items" :key="item.id" class="mt-2">
                <template v-if="item.isEditing">
                    <form @submit.prevent>
                        <div class="row g-3">
                            <div class="col">
                                <input v-model.trim="item.editingTodoItemText" class="form-control"
                                       type="text" :class="{ 'is-invalid': isEditTodoItemTextInvalid }">
                                <div class="invalid-feedback">Необходимо заполнить поле</div>
                            </div>

                            <div class="col-auto">
                                <button @click="saveTodoItem(item)" class="save-button btn btn-primary me-2">Сохранить</button>
                                <button @click="item.isEditing = false" class="cancel-button btn btn-secondary" type="button">Отменить</button>
                            </div>

                        </div>
                    </form>
                </template>
                <template v-else>
                    <div class="row">
                        <div class="col" v-text="item.text"></div>

                        <div class="col-auto">
                            <button @click="startEditing(item)" class="edit-button button btn btn-primary me-2" type="button">Редактировать</button>
                            <button @click="removeTodoItem(item)" class="delete-button button btn btn-danger" type="button">Удалить</button>
                        </div>
                    </div>
                </template>
            </li>
        </ul>
    </div>
</div>
</body>
</html>
