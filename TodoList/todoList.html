<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <script defer src="todoList.js"></script>
    <title>Страница, демонстрирующая список задач</title>
</head>
<body>
<div class="page">
    <h1 class="header">Список задач</h1>

    <div class="form-list">
        <form id="new-todo-form">
            <label for="new-todo-item-text-field">Введите текст задачи</label>
            <div class="input-container">
                <input id="new-todo-item-text-field" type="text">
                <button class="button create-button">Создать</button>
            </div>
            <div class="error-message">Необходимо заполнить поле</div>
        </form>

        <ul id="todo-list"></ul>
    </div>
</div>
</body>
</html>
