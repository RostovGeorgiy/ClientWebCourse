<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form action="" method="get">
    <label>
        Name
        <input type="text" name="nameInput">
    </label>
    <label>
        Description
        <textarea name="description"></textarea>
    </label>
    <label>
        Select country
        <select name="countries" multiple>
            <option value="1" selected>Russia</option>
            <option value="2">Kazakhstan</option>
            <option value="3">Belarus</option>
        </select>
    </label>
    <br>
    <label>
        Select time in days
        <select name="daysAmount">
            <option value="1" selected>1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
        </select>
    </label>
    <br>
    <label>
        Return trip
        <input type="checkbox" name="checkbox" value="Return trip">
    </label>
    <br>
    <label>
        Select gender
        <input type="radio" value="1" name="genderRadio">Male
        <input type="radio" value="2" name="genderRadio">Female
    </label>
    <br>
    <button type="submit">Submit data</button>
</form>
<hr><br>
<a href="HTML2.html">Go to page 2</a>
</body>
</html>
