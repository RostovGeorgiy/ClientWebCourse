<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>A HTML test page displaying form with travel information.</title>

</head>

<body>

<h1>Traveler data</h1>

<form action="" method="post">
    <label>
        Name
        <input type="text" name="name">
    </label>

    <label>
        Description
        <textarea name="description"></textarea>
    </label>

    <label>
        Select country
        <select name="countries" multiple>
            <option value="1" selected>Russia</option>
            <option value="2">Kazakhstan</option>
            <option value="3">Belarus</option>
        </select>
    </label>

    <br>

    <label>
        Time in days
        <select name="daysAmount">
            <option value="1" selected>1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
        </select>
    </label>

    <br>

    <label>
        <input type="checkbox" name="checkbox" value="Return trip">
        Return trip
    </label>

    <br>

    <label>Select gender</label>
    <label><input type="radio" value="1" name="gender">Male</label>
    <label><input type="radio" value="2" name="gender">Female</label>

    <br>

    <button type="submit">Submit data</button>
</form>

<hr>
<br>

<a href="Html2.html">Go to page 2</a>

</body>
</html>
