<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Temperature converter page</title>
    <script src="temperatureConversion.js" defer></script>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page">
    <div class="content">
        <h1>Temperature converter</h1>
        <form id="temperature-conversion-form">
            <label for="temperature-input-field">
                Input temperature:
                <input type="text" id="temperature-input-field" placeholder="Your temperature value">
            </label>
            <button class="convert-button">Convert temperature</button>
            <output id="fahrenheit-temperature-output" class="temperature-output"></output>
            <output id="kelvin-temperature-output" class="temperature-output"></output>
            <output id="error-message-output" class="error-output"></output>
        </form>
    </div>
</div>
</body>
</html>
