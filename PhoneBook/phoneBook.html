<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <script defer src="jquery-4.0.0.min.js"></script>
    <script defer src="phoneBook.js"></script>
    <title>Страница, демонстрирующая телефонную книгу</title>
</head>
<body>
<div class="page">
    <div class="content">
        <h1 class="header">Телефонная книга</h1>

        <div class="add-user-form-container">
            <form id="add-user-form">
                <label for="last-name-text-field">Фамилия: </label>
                <div class="input-container">
                    <input class="last-name-text-field" id="last-name-text-field" type="text">
                </div>

                <label for="first-name-text-field">Имя: </label>
                <div class="input-container">
                    <input class="first-name-text-field" id="first-name-text-field" type="text">
                </div>

                <label for="phone-number-text-field">Номер телефона: </label>
                <div class="input-container">
                    <input class="phone-number-text-field" id="phone-number-text-field" type="text">
                </div>
                <div class="error-message"></div>

                <button class="button create-button">Создать</button>
            </form>
        </div>

        <table class="table" id="phone-table">
            <thead>
            <tr>
                <th class="id">№</th>
                <th class="last-name">Фамилия</th>
                <th class="first-name">Имя</th>
                <th class="phone-number">Номер телефона</th>
                <th class="buttons-cell"></th>
            </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
        <div class="edit-error-message"></div>
    </div>
</div>
</body>
</html>
